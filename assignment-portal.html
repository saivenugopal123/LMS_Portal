<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment Portal – Aditya University LMS</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body {
      padding-top: 64px;
    }

    .upload-panel {
      background: #fff;
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 28px;
      box-shadow: 0 4px 18px rgba(79, 70, 229, 0.08);
      border: 1px solid var(--border);
      border-left: 4px solid var(--rose, #E11D48);
    }

    .upload-panel h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
    }

    .upload-panel select,
    .upload-panel input[type="text"],
    .upload-panel input[type="file"] {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .upload-panel select:focus,
    .upload-panel input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: #fff;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 20px;
      box-shadow: 0 2px 10px rgba(79, 70, 229, 0.06);
      border: 1px solid var(--border);
    }

    .filter-row label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .filter-row select {
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .section-heading {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }

    .assignment-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .assignment-card {
      background: #fff;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.07);
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .assignment-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 24px rgba(79, 70, 229, 0.13);
    }

    .assignment-card h4 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .assignment-card a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    .assignment-card a:hover {
      text-decoration: underline;
    }

    .assignment-card .meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <div class="lms-sub-header">
    <a class="back-btn" href="home.html">← Back</a>
    📝 Assignment Portal
  </div>

  <div class="lms-container">

    <!-- Student upload panel -->
    <div id="student-upload-section" class="upload-panel" style="display:none;">
      <h3>📤 Upload Assignment (PDF)</h3>
      <select id="pdf-subject">
        <option value="">Select Subject</option>
        <option value="Management">Management</option>
        <option value="Marketing">Marketing</option>
        <option value="Finance">Finance</option>
      </select>
      <input type="text" id="pdf-title" placeholder="Assignment title" />
      <input type="file" id="pdf-file" accept="application/pdf" />
      <button class="lms-btn" style="background:linear-gradient(135deg,#E11D48,#F97316)" id="upload-assignment">Upload
        Assignment</button>
    </div>

    <!-- Teacher / student filter -->
    <div id="teacher-filter" class="filter-row" style="display:none;">
      <label>Subject:</label>
      <select id="filter-subject">
        <option value="">All Subjects</option>
        <option value="Management">Management</option>
        <option value="Marketing">Marketing</option>
        <option value="Finance">Finance</option>
      </select>
    </div>

    <div id="assignments-container">
      <div class="section-heading">Uploaded Assignments</div>
      <div class="assignment-list" id="assignment-list"></div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const role = localStorage.getItem("chat_role") || "student";
      const username = localStorage.getItem("chat_username") || "Guest";
      const uploadSection = document.getElementById("student-upload-section");
      const teacherFilter = document.getElementById("teacher-filter");
      const filterSubject = document.getElementById("filter-subject");
      const assignmentList = document.getElementById("assignment-list");

      if (role === "student") {
        uploadSection.style.display = "block";
        teacherFilter.style.display = "flex";
        filterSubject.addEventListener("change", loadPDFs);
      } else if (role === "teacher") {
        teacherFilter.style.display = "flex";
        filterSubject.addEventListener("change", loadPDFs);
      }

      function loadPDFs() {
        const stored = JSON.parse(localStorage.getItem("assignment_pdfs") || "[]");
        assignmentList.innerHTML = "";
        let filtered = stored;
        if (role === "teacher") {
          const teacherSubject = localStorage.getItem("teacher_subject") || "";
          filtered = stored.filter(i => i.subject === teacherSubject);
        } else {
          filtered = stored.filter(i => i.uploadedBy === username);
          if (filterSubject.value) filtered = filtered.filter(i => i.subject === filterSubject.value);
        }
        if (!filtered.length) {
          assignmentList.innerHTML = `<div style="color:var(--text-muted);padding:20px;text-align:center;">No assignments found.</div>`;
          return;
        }
        filtered.forEach(item => {
          const div = document.createElement("div");
          div.className = "assignment-card";
          div.innerHTML = `
            <h4>${item.title}</h4>
            <span class="lms-badge indigo">${item.subject}</span>
            <br><br>
            <a href="${item.fileData}" target="_blank">📄 ${item.fileName}</a>
            <div class="meta">Uploaded by: ${item.uploadedBy} &nbsp;|&nbsp; ${new Date(item.uploadedAt).toLocaleString()}</div>`;
          assignmentList.appendChild(div);
        });
      }

      document.getElementById("upload-assignment").addEventListener("click", () => {
        const subject = document.getElementById("pdf-subject").value;
        const title = document.getElementById("pdf-title").value.trim();
        const file = document.getElementById("pdf-file").files[0];
        if (!subject) { alert("Please select a subject."); return; }
        if (!title || !file || file.type !== "application/pdf") { alert("Please enter a title and select a valid PDF."); return; }
        const reader = new FileReader();
        reader.onload = () => {
          const blobUrl = URL.createObjectURL(new Blob([reader.result], { type: "application/pdf" }));
          const stored = JSON.parse(localStorage.getItem("assignment_pdfs") || "[]");
          stored.unshift({ subject, title, fileName: file.name, fileData: blobUrl, uploadedBy: username, uploadedAt: new Date().toISOString() });
          localStorage.setItem("assignment_pdfs", JSON.stringify(stored));
          alert("Assignment uploaded successfully!");
          document.getElementById("pdf-title").value = "";
          document.getElementById("pdf-subject").value = "";
          document.getElementById("pdf-file").value = "";
          loadPDFs();
        };
        reader.readAsArrayBuffer(file);
      });

      loadPDFs();
    });
  </script>
</body>

</html>
