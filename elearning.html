<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Learning – Aditya University LMS</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body {
      padding-top: 64px;
    }

    .upload-panel {
      background: #fff;
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 32px;
      box-shadow: 0 4px 20px rgba(79, 70, 229, 0.08);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
    }

    .upload-panel h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .upload-panel input,
    .upload-panel select {
      width: 100%;
      padding: 11px 14px;
      margin-bottom: 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
    }

    .upload-panel input:focus,
    .upload-panel select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
      background: #fff;
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 2px 10px rgba(79, 70, 229, 0.06);
      border: 1px solid var(--border);
    }

    .filter-bar label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .filter-bar select,
    .filter-bar input[type="text"] {
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      background: #fff;
    }

    .filter-bar select:focus,
    .filter-bar input[type="text"]:focus {
      border-color: var(--primary);
    }

    /* Video cards */
    .video-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .video-card {
      display: flex;
      gap: 18px;
      align-items: center;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.07);
      border: 1px solid var(--border);
      padding: 14px;
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .video-card:hover {
      transform: scale(1.01);
      box-shadow: 0 10px 28px rgba(79, 70, 229, 0.14);
    }

    .video-card iframe {
      width: 300px;
      height: 170px;
      border-radius: 10px;
      flex-shrink: 0;
      border: none;
    }

    .video-info {
      flex: 1;
    }

    .video-info h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .video-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .section-heading {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
    }

    @media (max-width: 700px) {
      .video-card {
        flex-direction: column;
      }

      .video-card iframe {
        width: 100%;
        height: 200px;
      }
    }
  </style>
</head>

<body>

  <div class="lms-sub-header">
    <a class="back-btn" href="home.html">← Back</a>
    🎓 E-Learning Portal
  </div>

  <div class="lms-container">

    <!-- Teacher upload -->
    <div id="teacher-upload-section" class="upload-panel" style="display:none;">
      <h3>📤 Upload a Video (YouTube)</h3>
      <input type="text" id="video-title" placeholder="Enter video title" />
      <input type="text" id="video-url" placeholder="Paste YouTube URL" />
      <button class="lms-btn accent" id="upload-video">Upload Video</button>
    </div>

    <!-- Student filter -->
    <div class="filter-bar" id="student-filter-bar" style="display:none;">
      <label>Filter by Subject:</label>
      <select id="subject-filter">
        <option value="">All Subjects</option>
        <option value="Management">Management</option>
        <option value="Marketing">Marketing</option>
        <option value="Finance">Finance</option>
      </select>
      <input type="text" id="search-bar" placeholder="Search by title…" />
      <button class="lms-btn" id="apply-filter">Apply</button>
    </div>

    <div id="videos-container">
      <div class="section-heading" id="videos-title">Available Videos</div>
      <div class="video-list" id="video-list"></div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const role = localStorage.getItem("chat_role") || "student";
      const username = localStorage.getItem("chat_username") || "Guest";
      const teacherSubject = localStorage.getItem("teacher_subject") || "";

      const uploadSection = document.getElementById("teacher-upload-section");
      const filterBar = document.getElementById("student-filter-bar");
      const subjectFilter = document.getElementById("subject-filter");
      const searchBar = document.getElementById("search-bar");
      const videoList = document.getElementById("video-list");
      const videosTitle = document.getElementById("videos-title");

      if (role === "teacher") { uploadSection.style.display = "block"; filterBar.style.display = "none"; }
      else { uploadSection.style.display = "none"; filterBar.style.display = "flex"; }

      function getVideos() { return JSON.parse(localStorage.getItem("elearning_videos") || "[]"); }
      function saveVideos(v) { localStorage.setItem("elearning_videos", JSON.stringify(v)); }

      if (role === "teacher") {
        document.getElementById("upload-video").addEventListener("click", () => {
          const title = document.getElementById("video-title").value.trim();
          const url = document.getElementById("video-url").value.trim();
          const subject = teacherSubject;
          if (!title || !url || (!url.includes("youtube.com") && !url.includes("youtu.be"))) {
            alert("Please enter a valid title and YouTube URL."); return;
          }
          if (!subject) { alert("Subject not set for this teacher."); return; }
          const videos = getVideos();
          videos.unshift({ title, url, subject, uploadedBy: username, uploadedAt: new Date().toISOString() });
          saveVideos(videos);
          alert("Video uploaded!");
          document.getElementById("video-title").value = "";
          document.getElementById("video-url").value = "";
          loadVideos();
        });
      }

      document.getElementById("apply-filter").addEventListener("click", loadVideos);
      subjectFilter.addEventListener("change", loadVideos);
      searchBar.addEventListener("input", loadVideos);

      function embedYouTube(url) {
        let id = url.includes("v=") ? url.split("v=")[1]?.split("&")[0] : url.split("/").pop();
        return `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
      }

      function loadVideos() {
        let videos = getVideos();
        videoList.innerHTML = "";
        if (role === "teacher") {
          videos = videos.filter(v => v.subject === teacherSubject && v.uploadedBy === username);
          videosTitle.textContent = `Videos: ${teacherSubject}`;
        } else {
          const sel = subjectFilter.value;
          const q = searchBar.value.trim().toLowerCase();
          if (sel) { videos = videos.filter(v => v.subject === sel); videosTitle.textContent = `Videos: ${sel}`; }
          else { videosTitle.textContent = "All Subject Videos"; }
          if (q) videos = videos.filter(v => v.title.toLowerCase().includes(q));
        }
        if (!videos.length) {
          videoList.innerHTML = `<div style="color:var(--text-muted);text-align:center;padding:30px;">No videos found.</div>`;
          return;
        }
        videos.forEach(v => {
          const div = document.createElement("div");
          div.className = "video-card";
          div.innerHTML = `${embedYouTube(v.url)}
            <div class="video-info">
              <h3>${v.title}</h3>
              <div class="video-meta">By: ${v.uploadedBy}</div>
              <div class="video-meta">Subject: <span class="lms-badge indigo">${v.subject}</span></div>
            </div>`;
          videoList.appendChild(div);
        });
      }
      loadVideos();
    });
  </script>
</body>

</html>
